<!DOCTYPE html>
<html>
<head>
    <title>Create Test User</title>
</head>
<body>
    <h1>Create Test User</h1>
    <form action="http://localhost:5000/api/auth/register" method="POST">
        <div>
            <label>Username:</label>
            <input type="text" name="username" value="testuser" required>
        </div>
        <div>
            <label>Email:</label>
            <input type="email" name="email" value="testuser@petshop.com" required>
        </div>
        <div>
            <label>Password:</label>
            <input type="password" name="password" value="test123" required>
        </div>
        <div>
            <label>First Name:</label>
            <input type="text" name="firstName" value="Test" required>
        </div>
        <div>
            <label>Last Name:</label>
            <input type="text" name="lastName" value="User" required>
        </div>
        <div>
            <label>Role:</label>
            <select name="role">
                <option value="super_admin">Super Admin</option>
                <option value="admin">Admin</option>
                <option value="customer">Customer</option>
            </select>
        </div>
        <button type="submit">Create User</button>
    </form>
</body>
</html>
